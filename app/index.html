<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>merge-lens</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
      h1 { font-size: 1.5rem; font-weight: 700; color: #f8fafc; margin: 0; }
      .app-header { padding: 1rem 1.5rem; border-bottom: 1px solid #1e293b; display: flex; align-items: center; gap: 1rem; }
      .app-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }
      button { cursor: pointer; border: none; border-radius: 6px; padding: 0.4rem 1rem; font-size: 0.9rem; font-weight: 500; transition: background 0.15s; }
      .btn-primary { background: #3b82f6; color: #fff; }
      .btn-primary:hover { background: #2563eb; }
      .btn-primary:disabled { background: #1e3a5f; color: #64748b; cursor: not-allowed; }
      .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #334155; }
      .btn-ghost:hover { background: #1e293b; }
      .btn-ghost.active { background: #1e3a5f; color: #60a5fa; border-color: #3b82f6; }
      textarea { width: 100%; background: #1e293b; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-family: monospace; font-size: 0.85rem; padding: 0.75rem; resize: vertical; min-height: 320px; }
      textarea:focus { outline: none; border-color: #3b82f6; }
      .error-text { color: #f87171; font-size: 0.8rem; margin-top: 0.25rem; }
      .label { font-size: 0.75rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
      .badge { font-size: 0.7rem; padding: 1px 6px; border-radius: 10px; font-weight: 600; }
      .badge-conflict { background: #450a0a; color: #f87171; }
      .badge-ok { background: #052e16; color: #4ade80; }
      .diff-added { color: #4ade80; }
      .diff-removed { color: #f87171; }
      .diff-modified { color: #fbbf24; }
      .diff-conflict { color: #f87171; }
      .diff-unchanged { color: #475569; }
      .diff-tree { font-family: monospace; font-size: 0.875rem; }
      .diff-node { padding: 2px 0; }
      .diff-node-key { font-weight: 600; margin-right: 0.25rem; }
      .conflict-panel { background: #1a1a2e; border: 1px solid #334155; border-radius: 6px; padding: 0.75rem; margin: 0.25rem 0 0.25rem 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
      .conflict-row { display: flex; align-items: center; gap: 0.75rem; }
      .conflict-label { width: 52px; font-size: 0.75rem; color: #64748b; text-transform: uppercase; }
      .conflict-value { font-family: monospace; font-size: 0.85rem; color: #e2e8f0; flex: 1; }
      .merge-output { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 1rem; }
      .json-output { font-family: monospace; font-size: 0.875rem; white-space: pre; overflow-x: auto; color: #e2e8f0; }
      .mode-toggle { display: flex; gap: 0.5rem; }
      .editors-grid { display: grid; gap: 1rem; }
      .editors-grid.two-col { grid-template-columns: 1fr 1fr; }
      .editors-grid.three-col { grid-template-columns: 1fr 1fr 1fr; }
      .editor-block { display: flex; flex-direction: column; }
      .error-banner { background: #450a0a; border: 1px solid #991b1b; border-radius: 6px; padding: 0.5rem 0.75rem; color: #f87171; font-size: 0.875rem; }
    </style>
  </head>
  <body></body>
</html>
